<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Calendar</title>

  <!-- PWA -->
  <meta name="theme-color" content="#BFA07A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Fit Cal" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@900&display=swap" rel="stylesheet" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Big Shoulders Display', sans-serif;
      background-color: #FBF8F2;
      background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0H0v40' fill='none' stroke='rgba(191%2C160%2C122%2C0.10)' stroke-width='1'/%3E%3C/svg%3E");
      background-size: 40px 40px;
      background-position: 40px 40px;
      color: #111;
      min-height: 100vh;
    }

    /* ── Header ── */
    .hdr {
      padding: 36px 40px 24px;
    }

    .nav-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
    }

    .nav-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(191,160,122,0.18);
      background: transparent;
      color: #BFA07A;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color .15s, background .15s;
      font-family: inherit;
    }
    .nav-btn:hover { border-color: rgba(191,160,122,0.45); background: rgba(191,160,122,0.07); }
    .nav-btn:active { background: rgba(191,160,122,0.14); }

    .cal-title {
      flex: 1;
      font-size: 46px;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: #BFA07A;
      text-transform: uppercase;
      line-height: 1;
    }

    .hdr-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Sync dot */
    .sync-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(191,160,122,0.35);
      transition: background .4s;
      flex-shrink: 0;
    }
    .sync-dot.syncing { background: #F57F17; animation: pulse .9s infinite; }
    .sync-dot.online  { background: #2E7D32; }
    .sync-dot.error   { background: #C62828; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* Legend */
    .legend { display: flex; flex-wrap: wrap; gap: 6px 18px; }
    .leg {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 900;
      color: #D4BE9E;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── Calendar wrap ── */
    .wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 40px 64px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* ── Month block ── */
    .month { display: flex; flex-direction: column; gap: 0; }

    .month-title {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #D4BE9E;
      font-family: 'Courier New', Courier, monospace;
      padding: 0 0 10px 2px;
    }

    /* ── Weekday labels ── */
    .dow {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px;
    }
    .dow-lbl {
      text-align: center;
      padding: 0 4px 8px;
      font-size: 11px;
      font-weight: 900;
      font-family: 'Courier New', Courier, monospace;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #D4BE9E;
    }

    /* ── Days grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    /* ── Day cell ── */
    .cell {
      position: relative;
      border: 1px solid rgba(191,160,122,0.18);
      border-radius: 4px;
      min-height: 120px;
      background: rgba(191,160,122,0.08);
      cursor: pointer;
      overflow: hidden;
      transition: filter .15s;
    }
    .cell.empty {
      cursor: default;
      pointer-events: none;
      background: rgba(191,160,122,0.04);
      border-color: rgba(191,160,122,0.09);
    }
    .cell:not(.empty):hover { filter: brightness(.94); }

    /* Logged day: filled with blended color, border removed */
    .cell.filled {
      background: var(--cell-bg);
      border: none;
    }

    /* Today highlight on empty cells */
    .cell.today:not(.filled) {
      border-color: rgba(191,160,122,0.55);
    }

    /* Big date number — bottom left */
    .day-num {
      position: absolute;
      bottom: 8px;
      left: 10px;
      font-size: 56px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #BFA07A;
      font-family: 'Big Shoulders Display', sans-serif;
      user-select: none;
      pointer-events: none;
    }
    .cell.filled .day-num { color: #FBF8F2; }
    .cell.empty  .day-num { color: rgba(191,160,122,0.28); }

    /* Photo thumbnail — top right */
    .cell-thumb {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,.8);
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
      pointer-events: none;
    }

    /* ── Overlay ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.38);
      z-index: 900;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .overlay.open { display: flex; }

    /* ── Popup (keeps original system font for readability) ── */
    .popup {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      max-height: 92vh;
      overflow-y: auto;
      overflow-x: hidden;
      box-shadow: 0 16px 56px rgba(0,0,0,.2);
      animation: popIn .16s ease;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.92) translateY(8px); }
      to   { opacity: 1; transform: scale(1)   translateY(0);   }
    }

    .pop-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 13px;
      border-bottom: 1px solid #f0f0f0;
    }
    .pop-title { font-size: .95rem; font-weight: 800; color: #111; }
    .pop-close {
      width: 28px; height: 28px;
      border: none; border-radius: 50%;
      background: #f1f3f5; color: #555;
      font-size: .85rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .pop-close:hover { background: #e5e7ea; }

    .tog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 16px 20px 10px;
    }
    .tog {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 12px 6px;
      border-radius: 10px;
      border: 2px solid #eceef0;
      background: #fff;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: border-color .15s, background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .tog:active { transform: scale(.96); }
    .tog svg { width: 28px; height: 28px; }
    .tog-lbl { font-size: .65rem; font-weight: 700; color: #bbb; transition: color .15s; }
    .tog.on { border-color: var(--c); background: color-mix(in srgb, var(--c) 10%, #fff); }
    .tog.on .tog-lbl { color: var(--c); }

    .pop-notes { padding: 4px 20px 20px; display: flex; flex-direction: column; gap: 12px; }
    .note-field { display: flex; flex-direction: column; gap: 4px; }
    .note-lbl {
      display: flex; align-items: center; gap: 6px;
      font-size: .67rem; font-weight: 700; color: #999;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .note-lbl-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .note-ta {
      width: 100%;
      border: 1px solid #e8eaed;
      border-radius: 8px;
      padding: 8px 10px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: .75rem;
      color: #222;
      background: #fafbfc;
      resize: none;
      transition: border-color .15s;
      line-height: 1.5;
    }
    .note-ta:focus { outline: none; border-color: #aaa; background: #fff; }
    .note-ta::placeholder { color: #ccc; }

    /* ── Photo section ── */
    .pop-photo { padding: 0 20px 20px; }
    .photo-upload-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      border: 2px dashed #dde0e6;
      border-radius: 10px;
      background: #fafbfc;
      color: #aaa;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .photo-upload-btn:hover { border-color: #aab0be; background: #f4f5f7; }
    .photo-preview-wrap {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
    }
    .photo-preview-wrap img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 260px;
      object-fit: cover;
    }
    .photo-remove {
      position: absolute;
      top: 8px; right: 8px;
      width: 30px; height: 30px;
      border: none; border-radius: 50%;
      background: rgba(0,0,0,.55);
      color: #fff;
      font-size: .85rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-remove:hover { background: rgba(0,0,0,.75); }
    .photo-lbl {
      display: flex; align-items: center; gap: 6px;
      font-size: .67rem; font-weight: 700; color: #999;
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 6px;
    }

    /* ── Install banner ── */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #BFA07A;
      color: #FBF8F2;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: .78rem;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(0,0,0,.18);
      gap: 12px;
      align-items: center;
      z-index: 999;
      white-space: nowrap;
    }
    #install-banner.show { display: flex; }
    #install-btn { background: #FBF8F2; color: #BFA07A; border: none; border-radius: 6px; padding: 6px 14px; font-weight: 700; font-size: .78rem; cursor: pointer; font-family: inherit; }
    #install-dismiss { background: none; border: none; color: rgba(251,248,242,.7); font-size: 1rem; cursor: pointer; padding: 0 0 0 4px; }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .hdr   { padding: 24px 16px 16px; }
      .wrap  { padding: 0 10px 48px; gap: 24px; }
      .cal-title { font-size: 30px; }
      .cell  { min-height: 86px; }
      .day-num { font-size: 40px; bottom: 6px; left: 7px; }
    }
    @media (max-width: 480px) {
      .cal-title { font-size: 22px; }
      .cell    { min-height: 62px; }
      .day-num { font-size: 28px; bottom: 4px; left: 5px; }
      .dow-lbl { font-size: 9px; letter-spacing: 0.06em; }
    }
  </style>
</head>
<body>

<header class="hdr">
  <div class="nav-row">
    <button class="nav-btn" id="navPrev" aria-label="Previous months">&#8249;</button>
    <div class="cal-title" id="calTitle"></div>
    <div class="hdr-right">
      <span id="syncDot" class="sync-dot" title="Sync status"></span>
      <button class="nav-btn" id="navNext" aria-label="Next months">&#8250;</button>
    </div>
  </div>
  <div class="legend" id="legend"></div>
</header>

<div class="wrap" id="wrap"></div>

<!-- Popup -->

        </div>
        <textarea class="note-ta" id="mNote" rows="2" placeholder="What did you eat today?"></textarea>
      </div>
    </div>

</div>

<!-- Install banner -->
<div id="install-banner">
  📲 Add to Home Screen
  <button id="install-btn">Install</button>
  <button id="install-dismiss">✕</button>
</div>

<script>

  run: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
       stroke-linecap="round" stroke-linejoin="round">
    <circle cx="14.5" cy="3.5" r="2" fill="currentColor" stroke="none"/>
    <path d="M14 6 11.5 11 9 15"/>
    <path d="M11.5 11 14.5 14.5"/>
    <path d="M13 8 17.5 9.5"/>
    <path d="M12.5 8.5 8.5 7"/>
  </svg>`,

const ACTS = [
  { id:'barbell', label:'Barbell',   color:'#1565C0' },
  { id:'hype',    label:'Hype',      color:'#C62828' },
  { id:'trainer', label:'Trainer',   color:'#F57F17' },
  { id:'meal',    label:'Meal Prep', color:'#2E7D32' },
  { id:'rest',    label:'Rest',      color:'#E91E8C' },
  { id:'run',     label:'Run',       color:'#F9A825' },

const MN = ['January','February','March','April','May','June',
            'July','August','September','October','November','December'];
const MN_UP = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE',
               'JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
const DN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

/* ── Supabase ── */
const SUPA_URL = 'https://kebwdamoxkykvilbczqu.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtlYndkYW1veGt5a3ZpbGJjenF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NDAxODQsImV4cCI6MjA5MjMxNjE4NH0.lhWClTvpfTHtcFzf1sB58YJCVdpM6-NIsVeERRafp68';
let supa = null;

/* ── Storage ── */
let db = {};
try { db = JSON.parse(localStorage.getItem('fitcal6') || '{}'); } catch {}

const getDay = k => db[k] || { acts:[], wNote:'', mNote:'', photo: null };
const dayKey = (y,m,d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

function rowToDay(row) {
  return {
    acts:  Array.isArray(row.icons) ? row.icons : [],
    wNote: row.workout || '',
    mNote: row.meal    || '',
    photo: row.photo   || null,

}

function setSyncDot(state) {
  const dot = document.getElementById('syncDot');
  if (dot) {
    dot.className = 'sync-dot ' + state;
    dot.title = { syncing:'Syncing…', online:'Synced', error:'Sync error — using local cache' }[state] || '';

}

async function persist(key) {
  localStorage.setItem('fitcal6', JSON.stringify(db));
  if (!supa) return;
  const d = db[key];
  setSyncDot('syncing');
  try {
    if (!d || (!d.acts.length && !d.wNote && !d.mNote && !d.photo)) {
      await supa.from('calendar_days').delete().eq('day_key', key);
    } else {
      await supa.from('calendar_days').upsert({
        day_key: key,
        icons:   d.acts,
        workout: d.wNote || null,
        meal:    d.mNote || null,
        photo:   d.photo || null,
      });
    }
    setSyncDot('online');
  } catch (e) {
    console.warn('Supabase write error:', e.message);
    setSyncDot('error');
  }
}

/* ── Image compression ── */
function compressImage(file, maxPx, quality, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxPx || h > maxPx) {
        if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else        { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function blendBg(acts) {
  const cols = acts.map(id => ACTS.find(a => a.id===id)?.color).filter(Boolean);
  if (!cols.length) return null;
  if (cols.length === 1) return cols[0];
  const stops = cols.map((c,i) => `${c} ${((i/(cols.length-1))*100).toFixed(0)}%`).join(', ');
  return `linear-gradient(135deg, ${stops})`;
}

/* ── Cell rendering (month view: number + color fill + photo only) ── */
function refreshCell(cell, k) {
  const data = getDay(k);
  const bg   = blendBg(data.acts);
  if (bg) {
    cell.classList.add('filled');
    cell.style.setProperty('--cell-bg', bg);
  } else {
    cell.classList.remove('filled');
    cell.style.removeProperty('--cell-bg');
  }
  const existing = cell.querySelector('.cell-thumb');
  if (existing) existing.remove();
  if (data.photo) {
    const thumb = document.createElement('img');
    thumb.className = 'cell-thumb';
    thumb.src = data.photo;
    thumb.alt = '';
    cell.appendChild(thumb);
  }
}

/* ── Month navigation state ── */
const today = new Date();
let baseOffset = 0;

function getMonthYear(offset) {
  let m = today.getMonth() + offset;
  let y = today.getFullYear() + Math.floor(m / 12);
  m = ((m % 12) + 12) % 12;
  return { y, m };
}

function updateTitle() {
  const a = getMonthYear(baseOffset);
  const b = getMonthYear(baseOffset + 1);
  const title = a.y === b.y
    ? `${MN_UP[a.m]} \u2014 ${MN_UP[b.m]} ${a.y}`
    : `${MN_UP[a.m]} ${a.y} \u2014 ${MN_UP[b.m]} ${b.y}`;
  document.getElementById('calTitle').textContent = title;
}

function buildMonth(year, month) {
  const isCur    = today.getFullYear()===year && today.getMonth()===month;
  const firstDow = new Date(year, month, 1).getDay();
  const lastDay  = new Date(year, month+1, 0).getDate();

  const block = document.createElement('div');
  block.className = 'month';

  const titleEl = document.createElement('div');
  titleEl.className = 'month-title';
  titleEl.textContent = `${MN_UP[month]} ${year}`;
  block.appendChild(titleEl);

  const dowRow = document.createElement('div');
  dowRow.className = 'dow';
  DN.forEach(d => {
    const l = document.createElement('div');
    l.className = 'dow-lbl';
    l.textContent = d;
    dowRow.appendChild(l);
  });
  block.appendChild(dowRow);

  const grid = document.createElement('div');
  grid.className = 'grid';

  for (let i = 0; i < firstDow; i++) {
    const e = document.createElement('div');
    e.className = 'cell empty';
    grid.appendChild(e);
  }

  for (let d = 1; d <= lastDay; d++) {
    const k = dayKey(year, month, d);
    const cell = document.createElement('div');
    cell.className = 'cell' + (isCur && today.getDate()===d ? ' today' : '');
    cell.dataset.k = k;
    cell.dataset.label = `${MN[month]} ${d}, ${year}`;
    cell.innerHTML = `<div class="day-num">${d}</div>`;
    refreshCell(cell, k);
    cell.addEventListener('click', () => openPopup(k, cell.dataset.label));
    grid.appendChild(cell);
  }

  block.appendChild(grid);
  return block;
}

function renderCalendar() {
  const wrap = document.getElementById('wrap');
  wrap.innerHTML = '';
  const a = getMonthYear(baseOffset);
  const b = getMonthYear(baseOffset + 1);
  wrap.appendChild(buildMonth(a.y, a.m));
  wrap.appendChild(buildMonth(b.y, b.m));
  updateTitle();
}

/* ── Popup ── */
let activeKey = null;

function openPopup(k, label) {
  activeKey = k;
  const data = getDay(k);
  document.getElementById('popTitle').textContent = label;
  document.getElementById('wNote').value = data.wNote || '';
  document.getElementById('mNote').value = data.mNote || '';

  const grid = document.getElementById('togGrid');
  grid.innerHTML = '';
  ACTS.forEach(act => {
    const btn = document.createElement('button');
    btn.className = 'tog' + (data.acts.includes(act.id) ? ' on' : '');
    btn.type = 'button';
    btn.style.setProperty('--c', act.color);
    btn.innerHTML = `<span style="color:${act.color};display:flex">${IC[act.id]}</span>`
                  + `<span class="tog-lbl">${act.label}</span>`;
    btn.addEventListener('click', () => {
      const r   = getDay(activeKey);
      const idx = r.acts.indexOf(act.id);
      idx === -1 ? r.acts.push(act.id) : r.acts.splice(idx, 1);
      db[activeKey] = r; persist(activeKey);
      btn.classList.toggle('on', r.acts.includes(act.id));
      const cell = document.querySelector(`.cell[data-k="${activeKey}"]`);
      if (cell) refreshCell(cell, activeKey);
    });
    grid.appendChild(btn);
  });

  renderPopupPhoto(data.photo || null);
  document.getElementById('overlay').classList.add('open');
}

function renderPopupPhoto(photoData) {
  const section = document.getElementById('popPhoto');
  section.innerHTML = `<div class="photo-lbl">📷 Workout Photo</div>`;

  if (photoData) {
    const wrap = document.createElement('div');
    wrap.className = 'photo-preview-wrap';
    wrap.innerHTML = `<img src="${photoData}" alt="Workout photo">
      <button class="photo-remove" title="Remove photo">✕</button>`;
    wrap.querySelector('.photo-remove').addEventListener('click', () => {
      const r = getDay(activeKey);
      r.photo = null;
      db[activeKey] = r; persist(activeKey);
      renderPopupPhoto(null);
      const cell = document.querySelector(`.cell[data-k="${activeKey}"]`);
      if (cell) refreshCell(cell, activeKey);
    });
    section.appendChild(wrap);
  } else {
    const lbl = document.createElement('label');
    lbl.className = 'photo-upload-btn';
    lbl.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> Add workout photo`;
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
    input.style.display = 'none';
    input.addEventListener('change', e => {
      const file = e.target.files[0]; if (!file) return;
      compressImage(file, 900, 0.72, dataUrl => {
        const r = getDay(activeKey);
        r.photo = dataUrl;
        db[activeKey] = r; persist(activeKey);
        renderPopupPhoto(dataUrl);
        const cell = document.querySelector(`.cell[data-k="${activeKey}"]`);
        if (cell) refreshCell(cell, activeKey);
      });
    });
    lbl.appendChild(input);
    section.appendChild(lbl);
  }
}

function closePopup() {
  if (!activeKey) return;
  const r = getDay(activeKey);
  r.wNote = document.getElementById('wNote').value;
  r.mNote = document.getElementById('mNote').value;
  db[activeKey] = r; persist(activeKey);
  const cell = document.querySelector(`.cell[data-k="${activeKey}"]`);
  if (cell) refreshCell(cell, activeKey);
  document.getElementById('overlay').classList.remove('open');
  activeKey = null;
}

document.getElementById('popClose').addEventListener('click', closePopup);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closePopup();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });

/* ── Navigation ── */
document.getElementById('navPrev').addEventListener('click', () => { baseOffset--; renderCalendar(); });
document.getElementById('navNext').addEventListener('click', () => { baseOffset++; renderCalendar(); });

/* ── Legend ── */
function buildLegend() {
  const el = document.getElementById('legend');
  ACTS.forEach(a => {
    const item = document.createElement('span');
    item.className = 'leg';
    item.innerHTML = `<span class="leg-dot" style="background:${a.color}"></span>${a.label}`;
    el.appendChild(item);
  });
}

/* ── Init ── */
(function init() {
  buildLegend();
  renderCalendar();
  initSupabase();
})();

async function initSupabase() {
  try {
    supa = window.supabase.createClient(SUPA_URL, SUPA_KEY, {
      global: {
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': 'Bearer ' + SUPA_KEY,
        }
      }
    });
    setSyncDot('syncing');

    const { data, error } = await supa.from('calendar_days').select('*');
    if (error) throw error;

    if (data.length > 0) {
      db = {};
      data.forEach(row => { db[row.day_key] = rowToDay(row); });
    } else if (Object.keys(db).length > 0) {
      const rows = Object.entries(db).map(([day_key, d]) => ({
        day_key,
        icons:   d.acts  || [],
        workout: d.wNote || null,
        meal:    d.mNote || null,
        photo:   d.photo || null,
      }));
      const { error: upErr } = await supa.from('calendar_days').upsert(rows);
      if (upErr) throw upErr;
    }

    localStorage.setItem('fitcal6', JSON.stringify(db));
    document.querySelectorAll('.cell[data-k]').forEach(cell => refreshCell(cell, cell.dataset.k));
    setSyncDot('online');

    supa.channel('calendar-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'calendar_days' }, payload => {
        if (payload.eventType === 'DELETE') {
          delete db[payload.old.day_key];
          const cell = document.querySelector(`.cell[data-k="${payload.old.day_key}"]`);
          if (cell) refreshCell(cell, payload.old.day_key);
        } else {
          const row = payload.new;
          db[row.day_key] = rowToDay(row);
          const cell = document.querySelector(`.cell[data-k="${row.day_key}"]`);
          if (cell) refreshCell(cell, row.day_key);
        }
        localStorage.setItem('fitcal6', JSON.stringify(db));
      })
      .subscribe(status => { if (status === 'SUBSCRIBED') setSyncDot('online'); });

  } catch (e) {
    console.warn('Supabase unavailable, using local cache:', e.message);
    setSyncDot('error');
  }
}

/* ── PWA: Install prompt ── */
let deferredPrompt = null;
const banner = document.getElementById('install-banner');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  banner.classList.add('show');
});

document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  banner.classList.remove('show');
});

document.getElementById('install-dismiss').addEventListener('click', () => {
  banner.classList.remove('show');
});

window.addEventListener('appinstalled', () => { banner.classList.remove('show'); });

/* ── Service Worker ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(console.error);
  });
}
</script>
